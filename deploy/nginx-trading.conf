# Reverse proxy for the trading dashboard.
# Put at: /etc/nginx/sites-available/trading  (then symlink into sites-enabled)
# certbot will rewrite/extend this to add the HTTPS (443) block + redirect.
server {
    listen 80;
    server_name pabs-trading.duckdns.org;

    # allow a little room for scan responses
    proxy_read_timeout 120s;
    client_max_body_size 4m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
